version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tiketi
      POSTGRES_USER:     tiketi
      POSTGRES_PASSWORD: tiketi_dev_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U tiketi"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: tiketi
      RABBITMQ_DEFAULT_PASS: tiketi_dev_pass
    ports:
      - "5672:5672"
      - "15672:15672"    # management UI at localhost:15672
    healthcheck:
      test: ["CMD","rabbitmq-diagnostics","ping"]
      interval: 10s
      retries: 5

  # ── Django web ───────────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:       db
      REDIS_URL:     redis://redis:6379/0
      RABBITMQ_URL:  amqp://tiketi:tiketi_dev_pass@rabbitmq:5672//
      DEBUG:         "True"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:       { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Celery worker ────────────────────────────────────────────────────────────
  celery:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:      db
      REDIS_URL:    redis://redis:6379/0
      RABBITMQ_URL: amqp://tiketi:tiketi_dev_pass@rabbitmq:5672//
    volumes:
      - .:/app
    depends_on:
      db:       { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    command: celery -A config worker -l info -Q default,contracts -c 4

  # ── Celery beat (scheduler) ───────────────────────────────────────────────────
  celery-beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:      db
      REDIS_URL:    redis://redis:6379/0
      RABBITMQ_URL: amqp://tiketi:tiketi_dev_pass@rabbitmq:5672//
    volumes:
      - .:/app
    depends_on:
      db:       { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Contract event listener ───────────────────────────────────────────────────
  listener:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:   db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db: { condition: service_healthy }
    command: python manage.py run_event_listener

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  pg_data:
  static_files:
