<form method="post"
      hx-post="{% url 'accounts:login' %}"
      hx-target="body"
      hx-push-url="true">
  {% csrf_token %}
  <input type="hidden" name="method" value="phone_verify">

  <p class="text-sm text-gray-600 mb-4">
    Code sent. Enter it below — valid for 5 minutes.
  </p>

  <div>
    <label class="block text-xs font-medium text-gray-600 mb-1">6-digit code</label>
    <input type="text" name="otp_code" maxlength="6" pattern="[0-9]{6}"
           inputmode="numeric" autocomplete="one-time-code" autofocus
           class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm text-center
                  font-mono text-xl tracking-widest
                  focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
  </div>

  <button type="submit"
          class="w-full mt-4 bg-brand text-white py-2.5 rounded-xl text-sm font-medium
                 hover:bg-brand-dark transition">
    Verify
  </button>
</form>
