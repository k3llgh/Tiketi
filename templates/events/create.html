{% extends "base/base.html" %}
{% block title %}Create event{% endblock %}

{% block content %}
<div class="max-w-xl">
  <a href="{% url 'accounts:vendor_dashboard' %}" class="text-sm text-gray-400 hover:text-gray-600 mb-6 inline-block">
    ← Dashboard
  </a>

  <h1 class="text-2xl font-semibold text-gray-900 mb-6">Create event</h1>

  <form method="post" class="space-y-6">
    {% csrf_token %}

    <!-- Match details -->
    <div class="bg-white rounded-2xl border border-gray-200 p-5">
      <h2 class="text-sm font-medium text-gray-700 mb-4">Match details</h2>
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Home team</label>
            <input type="text" name="home_team" required
                   class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm
                          focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Away team</label>
            <input type="text" name="away_team" required
                   class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm
                          focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Competition</label>
            <input type="text" name="competition" placeholder="KPL, CAF, etc."
                   class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm
                          focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Venue</label>
            <input type="text" name="venue" required
                   class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm
                          focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Kickoff date &amp; time</label>
          <input type="datetime-local" name="kickoff" required
                 class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm
                        focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">Description (optional)</label>
          <textarea name="description" rows="2"
                    class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm
                           focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand resize-none"></textarea>
        </div>
      </div>
    </div>

    <!-- Seat categories -->
    <div class="bg-white rounded-2xl border border-gray-200 p-5">
      <h2 class="text-sm font-medium text-gray-700 mb-1">Seat categories</h2>
      <p class="text-xs text-gray-400 mb-4">Leave capacity at 0 to exclude a category.</p>

      <div class="space-y-4">
        {% for cat, label in cats %}
        <div class="border border-gray-100 rounded-xl p-4">
          <div class="text-sm font-medium text-gray-800 mb-3">{{ label }}</div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-gray-500 mb-1">Capacity</label>
              <input type="number" name="{{ cat }}_capacity" min="0" value="0"
                     class="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm
                            focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Price (USD cents)</label>
              <input type="number" name="{{ cat }}_price_cents" min="0" value="0"
                     placeholder="e.g. 500 = $5.00"
                     class="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm
                            focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <button type="submit"
            class="w-full bg-brand text-white py-3 rounded-xl font-medium text-sm
                   hover:bg-brand-dark transition">
      Create event →
    </button>
  </form>
</div>
{% endblock %}
